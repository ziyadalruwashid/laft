<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAFT — Footer</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;font-family:'Tajawal',sans-serif;-webkit-font-smoothing:antialiased;}

footer{
  background:#0d0d0d;
  padding:60px 40px 0;
  position:relative;
}

/* top gradient bar */
footer::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(to right,#003fa3,#da0260,#c8832a);
}

.footer-inner{
  max-width:1100px;margin:0 auto;
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr;
  gap:60px;
  padding-bottom:40px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

/* col 1: logo + desc + social */
.f-brand{}
.f-logo{
  display:flex;align-items:center;
  margin-bottom:20px;
}
.f-logo svg{width:90px;height:auto;color:#fff;} .f-logo svg path, .f-logo svg polygon { fill: #fff !important; } .f-logo svg rect { fill: #da0260 !important; }
.f-desc{
  font-size:14px;color:rgba(255,255,255,.5);
  line-height:1.75;font-weight:300;
  margin-bottom:28px;
  max-width:240px;
}
.f-social{display:flex;gap:10px;}
.f-social a{
  width:38px;height:38px;border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.5);
  text-decoration:none;
  transition:border-color .25s,background .25s,color .25s;
}
.f-social a:hover{
  border-color:#da0260;
  background:rgba(218,2,96,.1);
  color:#da0260;
}
.f-social a svg{width:16px;height:16px;}

/* col 2 & 3: links */
.f-col h4{
  font-size:16px;font-weight:700;color:#fff;
  margin-bottom:20px;letter-spacing:-.2px;
}
.f-col ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.f-col ul li a{
  font-size:14px;color:rgba(255,255,255,.45);
  text-decoration:none;font-weight:300;
  transition:color .2s;
}
.f-col ul li a:hover{color:#da0260;}

/* nav-style quick links */
.f-nav-links{display:flex;flex-direction:column;gap:4px !important;}
.f-nav-links li a{
  display:inline-block;
  font-size:14px;font-weight:500 !important;
  color:rgba(255,255,255,.55) !important;
  padding:7px 14px !important;
  border-radius:8px !important;
  transition:color .2s,background .2s !important;
}
.f-nav-links li a:hover{
  color:#da0260 !important;
  background:rgba(218,2,96,.08) !important;
}

/* newsletter */
.f-newsletter{margin-top:28px;}
.f-newsletter h5{
  font-size:14px;font-weight:600;color:rgba(255,255,255,.7);
  margin-bottom:12px;
}
.f-newsletter-form{
  display:flex;gap:8px;
}
.f-newsletter-input{
  flex:1;height:42px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  padding:0 14px;
  color:#fff;font-family:'Tajawal',sans-serif;font-size:13px;
  outline:none;
  transition:border-color .2s;
  text-align:right;
}
.f-newsletter-input::placeholder{color:rgba(255,255,255,.3);}
.f-newsletter-input:focus{border-color:rgba(218,2,96,.5);}
.f-newsletter-btn{
  height:42px;padding:0 18px;
  background:#da0260;color:#fff;
  border:none;border-radius:8px;
  font-family:'Tajawal',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;
  transition:background .2s;
}
.f-newsletter-btn:hover{background:#b8024f;}

/* bottom bar */
.footer-bottom{
  max-width:1100px;margin:0 auto;
  padding:20px 0;
  text-align:center;
  font-size:13px;color:rgba(255,255,255,.3);
}

/* responsive */
@media(max-width:768px){
  .footer-inner{grid-template-columns:1fr;gap:40px;}
  footer{padding:48px 24px 0;}
  .f-desc{max-width:100%;}
}

@media(max-width:900px){
  .footer-inner{grid-template-columns:1fr 1fr;gap:40px;}
  .f-brand{grid-column:span 2;}
}
@media(max-width:600px){
  .footer-inner{grid-template-columns:1fr;gap:36px;}
  .f-brand{grid-column:span 1;}
  footer{padding:40px 20px 0;}
  .f-social{flex-wrap:wrap;}
  .f-newsletter-form{flex-direction:column;}
  .f-newsletter-btn{width:100%;height:44px;}
  .footer-bottom{font-size:12px;padding:16px 0;}
}
</style>
</head>
